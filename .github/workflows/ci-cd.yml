name: Django Deploy EB CI/CD

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - develop
    paths:
      - ".github/workflows/ci-cd.yml"
      - "deploy/eb/deploy-django/**"
      - "deploy/local/**"
      - "services/django/**"
  push:
    branches:
      - develop
    paths:
      - ".github/workflows/ci-cd.yml"
      - "deploy/eb/deploy-django/**"
      - "deploy/local/**"
      - "services/django/**"

permissions:
  contents: read

concurrency:
  group: deploy-eb-django-develop
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-2
  DJANGO_IMAGE_REPO: 027099020675.dkr.ecr.ap-northeast-2.amazonaws.com/deploy-tailtalk-django
  DJANGO_EB_APP_NAME: deploy-tailtalk-django
  DJANGO_EB_ENV_NAME: deploy-tailtalk-django-env
  DJANGO_HEALTH_PATH: /health/

jobs:
  ci:
    name: CI - Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create test env file
        run: |
          cat <<'EOF' > deploy/local/.env
          DJANGO_SECRET_KEY=test-secret
          DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,testserver
          POSTGRES_DB=test_db
          POSTGRES_USER=test_user
          POSTGRES_PASSWORD=test_password
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          FASTAPI_INTERNAL_CHAT_URL=http://fastapi:8001/api/chat/
          FASTAPI_INTERNAL_RECOMMEND_URL=http://fastapi:8001/api/recommend/
          INTERNAL_SERVICE_TOKEN=dev-internal-token
          APP_BASE_URL=http://localhost
          CORS_ALLOWED_ORIGINS=
          FASTAPI_STREAM_CONNECT_TIMEOUT=5
          FASTAPI_STREAM_READ_TIMEOUT=25
          FASTAPI_STREAM_WRITE_TIMEOUT=10
          FASTAPI_STREAM_POOL_TIMEOUT=5
          EOF

      - name: Validate deploy nginx config
        run: docker run --rm --add-host django:127.0.0.1 -v "$PWD/deploy/eb/deploy-django/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" nginx:alpine nginx -t

      - name: Validate deploy compose bundle
        run: |
          rm -rf .deploy-django
          mkdir -p .deploy-django
          python3 - <<'PY'
          from pathlib import Path
          src = Path("deploy/eb/deploy-django/docker-compose.yml").read_text()
          Path(".deploy-django/docker-compose.yml").write_text(
              src.replace("__DJANGO_IMAGE__", "tailtalk-django:ci")
          )
          PY
          cp -r deploy/eb/deploy-django/nginx .deploy-django/nginx
          cp -r deploy/eb/deploy-django/.platform .deploy-django/.platform
          cat <<'EOF' > .deploy-django/.env
          DJANGO_SECRET_KEY=test-secret
          DJANGO_DEBUG=False
          DJANGO_ALLOWED_HOSTS=localhost
          APP_BASE_URL=http://localhost
          FASTAPI_INTERNAL_CHAT_URL=http://fastapi.example.com/api/chat/
          INTERNAL_SERVICE_TOKEN=dev-internal-token
          POSTGRES_DB=test_db
          POSTGRES_USER=test_user
          POSTGRES_PASSWORD=test_password
          POSTGRES_HOST=test-postgres
          POSTGRES_PORT=5432
          CORS_ALLOWED_ORIGINS=
          EOF
          docker compose -f .deploy-django/docker-compose.yml --env-file .deploy-django/.env config -q
          test -f .deploy-django/.platform/hooks/prebuild/01_ecr_login.sh
          test -f .deploy-django/.platform/confighooks/prebuild/01_ecr_login.sh

      - name: Reset local test stack
        run: docker compose -f deploy/local/docker-compose.yml down -v --remove-orphans || true

      - name: Build local test stack
        run: docker compose -f deploy/local/docker-compose.yml build django

      - name: Run Django tests
        run: docker compose -f deploy/local/docker-compose.yml run --rm django python manage.py test

      - name: Smoke test deploy bundle runtime
        run: |
          rm -rf .deploy-django
          mkdir -p .deploy-django
          python3 - <<'PY'
          from pathlib import Path
          src = Path("deploy/eb/deploy-django/docker-compose.yml").read_text()
          Path(".deploy-django/docker-compose.yml").write_text(
              src.replace("__DJANGO_IMAGE__", "tailtalk-django:latest")
          )
          PY
          cp -r deploy/eb/deploy-django/nginx .deploy-django/nginx
          cp -r deploy/eb/deploy-django/.platform .deploy-django/.platform
          cat <<'EOF' > .deploy-django/docker-compose.smoke.yml
          services:
            django:
              depends_on:
                postgres:
                  condition: service_healthy
            postgres:
              image: pgvector/pgvector:pg16
              platform: linux/amd64
              environment:
                POSTGRES_DB: ${POSTGRES_DB}
                POSTGRES_USER: ${POSTGRES_USER}
                POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
              expose:
                - "5432"
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
                interval: 5s
                timeout: 5s
                retries: 10
          EOF
          cat <<'EOF' > .deploy-django/.env
          DJANGO_SECRET_KEY=test-secret
          DJANGO_DEBUG=False
          DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
          APP_BASE_URL=http://localhost
          FASTAPI_INTERNAL_CHAT_URL=http://fastapi.example.com/api/chat/
          INTERNAL_SERVICE_TOKEN=dev-internal-token
          POSTGRES_DB=test_db
          POSTGRES_USER=test_user
          POSTGRES_PASSWORD=test_password
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          CORS_ALLOWED_ORIGINS=
          EOF
          cleanup() {
            docker compose \
              -f .deploy-django/docker-compose.yml \
              -f .deploy-django/docker-compose.smoke.yml \
              --env-file .deploy-django/.env \
              down -v --remove-orphans || true
          }
          trap cleanup EXIT
          docker compose \
            -f .deploy-django/docker-compose.yml \
            -f .deploy-django/docker-compose.smoke.yml \
            --env-file .deploy-django/.env \
            up -d
          for _ in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1/static/css/main.css > /dev/null \
              && curl --fail --silent http://127.0.0.1/static/admin/css/base.css > /dev/null; then
              break
            fi
            sleep 3
          done
          curl --fail --silent --show-error http://127.0.0.1/static/css/main.css > /dev/null
          curl --fail --silent --show-error http://127.0.0.1/static/admin/css/base.css > /dev/null
          curl --silent --show-error --head http://127.0.0.1/static/css/main.css | grep -qi '^Content-Type: text/css'

      - name: Teardown
        if: always()
        run: docker compose -f deploy/local/docker-compose.yml down -v --remove-orphans

  deploy-django:
    name: CD - Django Deploy EB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - ci
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: django-meta
        run: |
          short_sha="$(git rev-parse --short HEAD)"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "version_label=django-${short_sha}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update Django EB environment variables
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT || 5432 }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS || '.elasticbeanstalk.com' }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          FASTAPI_INTERNAL_CHAT_URL: ${{ secrets.FASTAPI_INTERNAL_CHAT_URL }}
          FASTAPI_INTERNAL_RECOMMEND_URL: ${{ secrets.FASTAPI_INTERNAL_RECOMMEND_URL }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          DJANGO_SECURE_SSL_REDIRECT: ${{ secrets.DJANGO_SECURE_SSL_REDIRECT }}
          DJANGO_SESSION_COOKIE_SECURE: ${{ secrets.DJANGO_SESSION_COOKIE_SECURE }}
          DJANGO_CSRF_COOKIE_SECURE: ${{ secrets.DJANGO_CSRF_COOKIE_SECURE }}
          DJANGO_CSRF_TRUSTED_ORIGINS: ${{ secrets.DJANGO_CSRF_TRUSTED_ORIGINS }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          AWS_S3_REGION_NAME: ap-northeast-2
          AWS_S3_CUSTOM_DOMAIN: ${{ secrets.AWS_S3_CUSTOM_DOMAIN }}
          AWS_S3_ENDPOINT_URL: ${{ secrets.AWS_S3_ENDPOINT_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          JUSO_CONFIRM_KEY: ${{ secrets.JUSO_CONFIRM_KEY }}
          FASTAPI_STREAM_CONNECT_TIMEOUT: ${{ secrets.FASTAPI_STREAM_CONNECT_TIMEOUT }}
          FASTAPI_STREAM_READ_TIMEOUT: ${{ secrets.FASTAPI_STREAM_READ_TIMEOUT }}
          FASTAPI_STREAM_WRITE_TIMEOUT: ${{ secrets.FASTAPI_STREAM_WRITE_TIMEOUT }}
          FASTAPI_STREAM_POOL_TIMEOUT: ${{ secrets.FASTAPI_STREAM_POOL_TIMEOUT }}
        run: |
          options_file="$RUNNER_TEMP/django-eb-env-options.json"
          python3 - <<'PY' > "$options_file"
          import json
          import os

          required_names = [
              "POSTGRES_DB",
              "POSTGRES_USER",
              "POSTGRES_PASSWORD",
              "POSTGRES_HOST",
              "POSTGRES_PORT",
              "DJANGO_SECRET_KEY",
              "FASTAPI_INTERNAL_CHAT_URL",
              "FASTAPI_INTERNAL_RECOMMEND_URL",
          ]
          optional_names = [
              "DJANGO_DEBUG",
              "DJANGO_ALLOWED_HOSTS",
              "APP_BASE_URL",
              "INTERNAL_SERVICE_TOKEN",
              "CORS_ALLOWED_ORIGINS",
              "DJANGO_SECURE_SSL_REDIRECT",
              "DJANGO_SESSION_COOKIE_SECURE",
              "DJANGO_CSRF_COOKIE_SECURE",
              "DJANGO_CSRF_TRUSTED_ORIGINS",
              "AWS_S3_BUCKET_NAME",
              "AWS_S3_REGION_NAME",
              "AWS_S3_CUSTOM_DOMAIN",
              "AWS_S3_ENDPOINT_URL",
              "GOOGLE_CLIENT_ID",
              "GOOGLE_CLIENT_SECRET",
              "NAVER_CLIENT_ID",
              "NAVER_CLIENT_SECRET",
              "KAKAO_CLIENT_ID",
              "KAKAO_CLIENT_SECRET",
              "JUSO_CONFIRM_KEY",
              "FASTAPI_STREAM_CONNECT_TIMEOUT",
              "FASTAPI_STREAM_READ_TIMEOUT",
              "FASTAPI_STREAM_WRITE_TIMEOUT",
              "FASTAPI_STREAM_POOL_TIMEOUT",
          ]

          missing = [name for name in required_names if not os.environ.get(name)]
          if missing:
              raise SystemExit(f"Missing required EB environment values: {', '.join(missing)}")

          options = []
          for name in required_names + optional_names:
              value = os.environ.get(name)
              if value is None or (name in optional_names and value == ""):
                  continue
              options.append(
                  {
                      "Namespace": "aws:elasticbeanstalk:application:environment",
                      "OptionName": name,
                      "Value": value,
                  }
              )
          print(json.dumps(options))
          PY
          aws elasticbeanstalk update-environment \
            --environment-name "$DJANGO_EB_ENV_NAME" \
            --option-settings "file://$options_file"
          aws elasticbeanstalk wait environment-updated \
            --environment-names "$DJANGO_EB_ENV_NAME"

      - name: Build & push Django image
        uses: docker/build-push-action@v6
        with:
          context: services/django
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DJANGO_IMAGE_REPO }}:latest
            ${{ env.DJANGO_IMAGE_REPO }}:${{ steps.django-meta.outputs.short_sha }}

    

      - name: Create Django deployment bundle
        run: |
          rm -rf .deploy-django django-deploy.zip
          mkdir -p .deploy-django
          python3 - <<'PY'
          from pathlib import Path
          src = Path("deploy/eb/deploy-django/docker-compose.yml").read_text()
          image = "${{ env.DJANGO_IMAGE_REPO }}:${{ steps.django-meta.outputs.short_sha }}"
          Path(".deploy-django/docker-compose.yml").write_text(
              src.replace("__DJANGO_IMAGE__", image)
          )
          PY
          cp -r deploy/eb/deploy-django/nginx .deploy-django/nginx
          cat <<'EOF' > .deploy-django/.env.check
          POSTGRES_DB=check_db
          POSTGRES_USER=check_user
          POSTGRES_PASSWORD=check_password
          POSTGRES_HOST=check-postgres
          POSTGRES_PORT=5432
          DJANGO_SECRET_KEY=check-secret
          DJANGO_DEBUG=False
          DJANGO_ALLOWED_HOSTS=.elasticbeanstalk.com
          APP_BASE_URL=http://example.com
          FASTAPI_INTERNAL_CHAT_URL=http://fastapi.example.com/api/chat/
          FASTAPI_INTERNAL_RECOMMEND_URL=http://fastapi.example.com/api/recommend/
          INTERNAL_SERVICE_TOKEN=check-internal-token
          CORS_ALLOWED_ORIGINS=
          DJANGO_SECURE_SSL_REDIRECT=False
          DJANGO_SESSION_COOKIE_SECURE=False
          DJANGO_CSRF_COOKIE_SECURE=False
          DJANGO_CSRF_TRUSTED_ORIGINS=
          AWS_S3_BUCKET_NAME=
          AWS_S3_REGION_NAME=ap-northeast-2
          AWS_S3_CUSTOM_DOMAIN=
          AWS_S3_ENDPOINT_URL=
          GOOGLE_CLIENT_ID=
          GOOGLE_CLIENT_SECRET=
          NAVER_CLIENT_ID=
          NAVER_CLIENT_SECRET=
          KAKAO_CLIENT_ID=
          KAKAO_CLIENT_SECRET=
          JUSO_CONFIRM_KEY=
          FASTAPI_STREAM_CONNECT_TIMEOUT=5
          FASTAPI_STREAM_READ_TIMEOUT=25
          FASTAPI_STREAM_WRITE_TIMEOUT=10
          FASTAPI_STREAM_POOL_TIMEOUT=5
          EOF
          docker compose -f .deploy-django/docker-compose.yml --env-file .deploy-django/.env.check config -q
          # .ebextensions 디렉토리 복사 (EB 기본 설정)
          cp -r deploy/eb/deploy-django/.ebextensions .deploy-django/.ebextensions
          cp -r deploy/eb/deploy-django/.platform .deploy-django/.platform
          cd .deploy-django
          zip -r ../django-deploy.zip docker-compose.yml nginx .ebextensions .platform

      - name: Deploy Django to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ env.AWS_REGION }}
          application_name: ${{ env.DJANGO_EB_APP_NAME }}
          environment_name: ${{ env.DJANGO_EB_ENV_NAME }}
          version_label: ${{ steps.django-meta.outputs.version_label }}
          deployment_package: django-deploy.zip
          use_existing_version_if_available: false
          wait_for_deployment: true
          wait_for_environment_recovery: 180

      - name: Resolve Django environment URL
        id: django-env
        run: |
          cname="$(aws elasticbeanstalk describe-environments \
            --application-name "$DJANGO_EB_APP_NAME" \
            --environment-names "$DJANGO_EB_ENV_NAME" \
            --query 'Environments[0].CNAME' \
            --output text)"
          echo "cname=$cname" >> "$GITHUB_OUTPUT"

      - name: Smoke test Django health endpoint
        run: |
          curl --fail --silent --show-error \
            --retry 12 \
            --retry-delay 10 \
            --retry-connrefused \
            "http://${{ steps.django-env.outputs.cname }}${{ env.DJANGO_HEALTH_PATH }}"
