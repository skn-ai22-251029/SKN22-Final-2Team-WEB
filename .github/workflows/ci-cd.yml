name: CI/CD

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env
        run: |
          cat <<'EOF' > infra/.env
          DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG=False
          DJANGO_ALLOWED_HOSTS=localhost,tailtalk.leemdo.com
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          CORS_ALLOWED_ORIGINS=http://localhost
          QDRANT_HOST=qdrant
          QDRANT_PORT=6333
          EOF

      - name: Build
        run: docker compose -f infra/docker-compose.yml build

      - name: Run Django tests
        run: docker compose -f infra/docker-compose.yml run --rm django python manage.py test

      - name: Teardown
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v

  push-images:
    name: Push Images to Docker Hub
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Django
        uses: docker/build-push-action@v6
        with:
          context: services/django
          platforms: linux/amd64
          push: true
          tags: leemdo/tailtalk-django:latest

      - name: Build & Push FastAPI
        uses: docker/build-push-action@v6
        with:
          context: services/fastapi
          platforms: linux/amd64
          push: true
          tags: leemdo/tailtalk-fastapi:latest

  deploy:
    name: Deploy to EC2
    needs: push-images
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 8m
          script: |
            cd ~/SKN22-Final-2Team-WEB
            git pull origin main
            docker compose -f infra/docker-compose.yml pull
            docker compose -f infra/docker-compose.yml up -d
            docker compose -f infra/docker-compose.yml exec -T django python manage.py migrate --noinput
            docker compose -f infra/docker-compose.yml exec -T django python manage.py collectstatic --noinput
