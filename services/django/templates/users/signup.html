{% extends "base.html" %}
{% block title %}회원가입 — TailTalk{% endblock %}

{% block content %}
<div class="auth-legacy-shell min-h-screen bg-[#f7fafc]">
  <div class="relative h-screen w-full overflow-hidden bg-[#f7fafc] flex items-center justify-center auth-legacy-scale">
    <div class="relative h-[244px] w-[400px] max-w-[calc(100vw-32px)] auth-legacy-card" id="authLegacyCard" data-ready="false">
      <img
        alt=""
        class="absolute left-0 top-0 h-[244px] w-[400px] max-w-full"
        src="https://www.figma.com/api/mcp/asset/eb8b7b54-70cf-4e1f-9cbf-46403968d531"
      />

      <a
        href="/"
        class="absolute left-[151px] top-[33px] h-[31px] w-[98px] text-center text-[26px] font-bold leading-none text-[#2d3748]"
      >
        <span class="text-[#3182ce]">Tail</span><span>Talk</span>
      </a>

      <img
        alt=""
        class="absolute left-[40px] top-[84px] h-[1px] w-[60px]"
        src="https://www.figma.com/api/mcp/asset/c35ab6dc-cd4c-4219-8ee0-4106934db393"
      />
      <div class="auth-legacy-divider-label absolute left-[156px] top-[74px] h-[20px] w-[88px]">
        <p class="auth-legacy-divider-text">간편 로그인</p>
      </div>
      <img
        alt=""
        class="absolute left-[300px] top-[84px] h-[1px] w-[60px]"
        src="https://www.figma.com/api/mcp/asset/c35ab6dc-cd4c-4219-8ee0-4106934db393"
      />

      <div class="absolute left-[106px] top-[114px] flex h-[48px] w-[188px] items-center justify-between">
        <a href="/auth/kakao/start/?remember=on" data-social-link aria-label="카카오 로그인">
          <img alt="" class="h-[40px] w-[40px]" src="https://www.figma.com/api/mcp/asset/d22d7edf-9f92-417d-8172-d0122cb9956e" />
        </a>
        <a href="/auth/naver/start/?remember=on" data-social-link aria-label="네이버 로그인">
          <img alt="" class="h-[40px] w-[40px]" src="https://www.figma.com/api/mcp/asset/7cfb3bd5-c1d7-42df-8155-0281c422f977" />
        </a>
        <a href="/auth/google/start/?remember=on" data-social-link aria-label="구글 로그인">
          <img alt="" class="h-[40px] w-[40px]" src="https://www.figma.com/api/mcp/asset/579f7bd6-15db-47cc-995e-1510a459db1d" />
        </a>
      </div>
      <button
        type="button"
        class="auth-legacy-remember absolute left-[126px] top-[186px] h-[26px] w-[148px]"
        style="display:flex; align-items:center; justify-content:flex-start; gap:10px; padding:0; border:0; background:transparent;"
        id="rememberToggle"
        aria-pressed="true"
      >
        <span class="auth-legacy-checkbox" aria-hidden="true" style="position:relative; width:18px; height:18px; flex:0 0 18px;">
          <img
            alt=""
            class="absolute left-0 top-0 h-[18px] w-[18px]"
            src="https://www.figma.com/api/mcp/asset/d87cedfa-0ee2-4f61-8bfd-ac58c6a6fb43"
          />
          <img
            alt=""
            class="absolute left-[5px] top-[6px] h-[6px] w-[8px]"
            id="rememberCheck"
            src="https://www.figma.com/api/mcp/asset/c1ccc9d0-f595-41ef-8f5c-668456e9975d"
          />
        </span>
        <span class="auth-legacy-remember-text" style="display:block; white-space:nowrap; line-height:1; margin-top:1px;">로그인 상태 유지</span>
      </button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  (function () {
    const card = document.getElementById('authLegacyCard');
    const images = card ? Array.from(card.querySelectorAll('img')) : [];
    let checked = true;
    const button = document.getElementById('rememberToggle');
    const check = document.getElementById('rememberCheck');
    const links = card ? Array.from(card.querySelectorAll('[data-social-link]')) : [];

    function revealWhenReady() {
      if (!card) return;
      const pending = images.filter(function (img) {
        return !img.complete;
      });
      if (pending.length === 0) {
        card.setAttribute('data-ready', 'true');
        return;
      }
      let loaded = 0;
      function markReady() {
        loaded += 1;
        if (loaded >= pending.length) {
          card.setAttribute('data-ready', 'true');
        }
      }
      pending.forEach(function (img) {
        img.addEventListener('load', markReady, { once: true });
        img.addEventListener('error', markReady, { once: true });
      });
    }

    button.addEventListener('click', function () {
      checked = !checked;
      button.setAttribute('aria-pressed', checked ? 'true' : 'false');
      check.classList.toggle('hidden', !checked);
    });

    links.forEach(function (link) {
      link.addEventListener('click', function (event) {
        event.preventDefault();
        var url = new URL(link.getAttribute('href'), window.location.origin);
        url.searchParams.set('remember', checked ? 'on' : 'off');
        window.location.href = url.toString();
      });
    });

    revealWhenReady();
  })();
</script>
{% endblock %}
