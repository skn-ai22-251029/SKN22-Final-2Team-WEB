http {
    upstream django {
        server django:8000;
    }

    upstream fastapi {
        server fastapi:8001;
    }

    server {
        listen 80;
        server_name _;

        # FastAPI — 챗봇 / 추천
        location /api/chat/ {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # SSE 스트리밍 지원
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        location /api/recommend/ {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/products/ {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Django — Auth / User / Pet / Order / Admin
        location /api/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /admin/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Django — Template (MVT)
        location / {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

events {}
